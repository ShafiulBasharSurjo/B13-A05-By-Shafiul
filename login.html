<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-13-A5-By-Shafiul</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="loginstyle.css">

</head>
<body>
    <div class="login-box">
        <form action="">
            <div class="input-box">
                <div class="logo">
                    <img class="logoimg" src="./assets/github-logo.png" alt="">
                    <h4 class="title">GitHub Issues Tracker</h4>
                    <p class="sub-title">Sign in to manage your issues</p>
                </div>
                <div>
                <p>Username</p>
                <input id="username" type="Username"  placeholder= "Enter Username" class="input input-bordered w-24 md:w-auto"/>
                <button onclick="autofillUsername()" class="default-link">Default: admin</button>
                </div>
                <div>
                <p>Password</p>
                <input id="password" type="Password"  placeholder= "Enter Password" class="input input-bordered w-24 md:w-auto"/>
                <button onclick="autofillPassword()" class="default-link">Default: admin123</button>
                </div>

                <div>
                    <button onclick="manageLogin()" class="btn bg-[#4A00FF] text-white" type="submit">Sign in
                    </button>
                </div>

                <div class="divider">
                    OR
                </div>

                <p class="demo">Demo Credentials</p>
                <div class="demoBox">
                    <p><span>Username:</span> admin</p>
                    <p><span>Password:</span> admin123</p>
                </div>

                <p id="error" class="error hidden">Invalid username or password.</p>

            </div>
        </form>
    </div>

    <script>
        function aurofillUsername(){
            document.getElementById('username').value = 'admin';
        }
        function aurofillPassword(){
            document.getElementById('password').value = 'admin123';
        }

        function manageLogin(){

            const un = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const error = document.getElementById('error');

            if (un === 'admin' && pass === 'admin123') {
                localStorage.setItem('loggedIn', 'true');
                window.location.href = './index.html';
            } 
            
            else {
                error.classList.remove('hidden');
            }
        }

        if(localStorage.getItem('loggedIn') === 'true'){
            window.location.href = './index.html';
        }
    </script>

</body>
</html>
